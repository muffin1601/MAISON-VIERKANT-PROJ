name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: maison_vierkant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/maison_vierkant_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/maison_vierkant_test
      NEXTAUTH_SECRET: ci-secret
      NEXTAUTH_URL: http://localhost:3000
    defaults:
      run:
        working-directory: maison-vierkant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: maison-vierkant/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run db:seed
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
