# Local development stack. For production, point DATABASE_URL/DIRECT_URL at Supabase
# and run only the `web` service (or deploy the image).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maison_vierkant
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/maison_vierkant"
      DIRECT_URL: "postgresql://postgres:postgres@db:5432/maison_vierkant"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "dev-secret-change-me"
      NODE_ENV: "production"
    ports:
      - "3000:3000"

volumes:
  db_data:
